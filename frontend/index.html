<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <header class="app-header">
            <img src="image/todo.svg" alt="TODO Logo" class="logo-image">
        </header>
        
        <form class="add-task-form" id="taskForm">
            <input type="text" id="taskInput" placeholder="Agregue un elemento de tarea pendiente..." class="task-input" required aria-label="Nueva tarea">
            <button type="submit" class="add-btn">Agregar</button>
        </form>
        
        <main class="content-layout">
            <section class="tasks-section">
                <header class="tasks-toolbar">
                    <button class="mark-all-btn" id="markAllBtn">Marcar todo listo</button>
                    <button class="scroll-top-btn">↑</button> 
                </header>
                
                <div class="empty-state" id="emptyStateContainer">
                    <p>¡Agrega tu primer artículo para hacer! </p>
                    <p>Consejos de uso :</p>
                    <ul>
                        <li> Presione Enter para enviar acciones.</li>
                        <li> Haga doble clic para editar las tareas.</li>
                        <li>Accede a filtros en la barra lateral derecha.</li>
                        <li> Los datos se guardarán en tu base de datos.</li>
                    </ul>
                </div>
                
                <ul class="task-list" id="taskListContainer"></ul>

                <footer class="tasks-footer" id="tasksFooter">
                    <span class="items-count" id="itemsCount">0 elementos restantes</span>
                </footer>
            </section>

            <aside class="sidebar">
                <header class="sidebar-header">
                    <h2>FILTROS </h2>
                </header>
                <nav class="sidebar-nav">
                    <button class="nav-btn active" data-filter="all">Todas</button>
                    <button class="nav-btn" data-filter="active">Activas (Pendientes)</button>
                    <button class="nav-btn" data-filter="completed">Completadas</button>
                    <button class="nav-btn" id="clearCompletedBtn">Limpiar completadas</button>
                    <button class="nav-btn" id="exportBtn">Exportar datos</button>
                </nav>
            </aside>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
